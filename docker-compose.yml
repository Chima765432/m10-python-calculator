services:

  db:
    image: postgres:16
    container_name: m10_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=fastapi_db
    ports:
      - "5432:5432"
    volumes:
      - m10_postgres_data:/var/lib/postgresql/data

volumes:
  m10_postgres_data:
